stages:
  - check

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")
    - when: never

"API":
  stage: check
  image: golang:1.26-alpine
  services:
    - name: postgres:18
      alias: postgres
  variables:
    POSTGRES_USER: ufo
    POSTGRES_PASSWORD: ufo
    POSTGRES_DB: ufo
    UFO_HUB_DATABASE_URL: postgres://ufo:ufo@postgres:5432/ufo?sslmode=disable
    UFO_HUB_TEST_DATABASE_URL: postgres://ufo:ufo@postgres:5432/ufo_test?sslmode=disable
  before_script:
    - apk add --no-cache postgresql-client
    - until pg_isready -h postgres -U ufo -d ufo; do sleep 1; done
    - PGPASSWORD=ufo psql -h postgres -U ufo -d ufo -c "CREATE DATABASE ufo_test" || true
  script:
    - cd apps/api
    - go build ./...
    - go vet ./...
    - go test ./...

"Web":
  stage: check
  image: node:26-alpine
  script:
    - cd apps/web
    - npm ci
    - npm run lint
    - npm run build

"Rover Lint":
  stage: check
  image: ghcr.io/rust-cross/cargo-zigbuild:latest
  before_script:
    - rustup component add rustfmt clippy
  script:
    - cd apps/rover
    - cargo fmt --check
    - cargo clippy -- -D warnings

"Rover Build":
  stage: check
  image: ghcr.io/rust-cross/cargo-zigbuild:latest
  parallel:
    matrix:
      - TARGET:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - x86_64-unknown-freebsd
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
          - aarch64-pc-windows-gnullvm
          - x86_64-pc-windows-gnullvm
  before_script:
    - rustup target add "$TARGET"
  script:
    - cd apps/rover
    - cargo zigbuild --target "$TARGET"

"Rover Build (MSVC)":
  stage: check
  tags:
    - saas-windows-medium-amd64
  before_script:
    - Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
    - .\rustup-init.exe -y --profile minimal --default-toolchain stable
    - $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
  script:
    - Set-Location apps\rover
    - cargo build --target x86_64-pc-windows-msvc

"Rover Test":
  stage: check
  image: ghcr.io/rust-cross/cargo-zigbuild:latest
  parallel:
    matrix:
      - TARGET:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
  before_script:
    - if echo "$TARGET" | grep -q musl; then apt-get update && apt-get install -y musl-tools; fi
    - rustup target add "$TARGET"
  script:
    - cd apps/rover
    - cargo test --target "$TARGET"

"Rover Test: [x86_64-pc-windows-msvc]":
  stage: check
  tags:
    - saas-windows-medium-amd64
  before_script:
    - Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
    - .\rustup-init.exe -y --profile minimal --default-toolchain stable
    - $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
  script:
    - cd apps/rover
    - cargo test

"OpenAPI":
  stage: check
  image: node:26-alpine
  script:
    - npx --yes @redocly/cli@2.36.0 lint apps/api/internal/spec/openapi.yaml
