openapi: 3.0.3
info:
  title: UFO Hub API
  version: 0.5.0
  license:
    name: BSD-3-Clause
    url: https://opensource.org/license/bsd-3-clause
  description: >
    Public beta Hub HTTP API for UFO (Unified Fleet Orchestrator). Endpoints and
    payloads may still change before 1.0; match clients to tagged releases and
    their release notes.
    Three surfaces: auth (public), the tenant/UI surface (httpOnly access JWT cookie
    or bearer token), and the rover surface (per-rover connection token). Source of truth for the
    protocol; maintained by hand alongside the code (generated clients are a follow-up).

servers:
  - url: /

security: []

tags:
  - name: auth
    description: Accounts and access tokens (public)
  - name: ui
    description: >
      Tenant/UI surface — httpOnly access JWT cookie or user bearer token.
      Collections use flat list/create (`GET|POST /v1/{resources}`); identity
      is `GET|PATCH|DELETE /v1/{resources}/{id}`. List filters and optional
      `fleet_id` are query params; create/update bodies carry `fleet_id` or
      parent foreign keys when needed. Fleet membership stays nested under
      `/v1/fleets/{id}/members`. Nested write exceptions (append-only or
      parent-coupled joins): reactions under operations/comments; operation
      labels; fleet members; crew members; rover run subpaths
      (`events`|`artifacts`|`messages`|`heartbeat`|`result`). Asset `/{id}/file`
      is a blob sub-resource, not a separate collection.
  - name: assets
    description: Asset metadata, upload, and file URLs
  - name: rover
    description: >
      Rover surface — per-rover connection token. Prefer collection creates
      and PATCH for status. Nested under a run for telemetry appends
      (`events`, `artifacts`, `messages`), lease `heartbeat`, and `result`.

paths:
  /:
    get:
      tags: [ui]
      operationId: discovery
      summary: Root — points at the RFC 9727 API catalog
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  service: { type: string }
                  api_catalog: { type: string, description: URL of the /.well-known/api-catalog }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /.well-known/api-catalog:
    get:
      tags: [ui]
      operationId: apiCatalog
      summary: API discovery (RFC 9727) — linkset of the hub's APIs + their spec/health
      responses:
        "200":
          description: OK
          content:
            application/linkset+json:
              schema: { type: object }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /openapi.yaml:
    get:
      tags: [ui]
      operationId: openapiSpec
      summary: This OpenAPI document (served on the hub origin for service-desc)
      responses:
        "200":
          description: OK
          content:
            application/yaml:
              schema: { type: string }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /healthz:
    get:
      tags: [ui]
      operationId: healthCheck
      summary: Liveness check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, version]
                properties:
                  status: { type: string }
                  version: { type: string }
                  rover_min_version: { type: string, description: Minimum UFO rover CLI version accepted by this Hub. }
                  rover_max_version: { type: string, description: "Maximum UFO rover CLI version accepted by this Hub, or empty when unbounded." }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/auth/signup:
    post:
      tags: [auth]
      operationId: signup
      summary: Create an account (auto-creates a fleet and membership) and access cookie
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "201":
          description: Created (sets ufo_access httpOnly JWT cookie)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Sign in and set the access cookie
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK (sets ufo_access httpOnly JWT cookie)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: End the current session
      responses:
        "204": { description: Logged out }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/users/me:
    get:
      tags: [ui]
      operationId: me
      summary: Signed-in user private profile
      description: Full account fields for the current principal (email, timestamps, …).
      security: [{ accessCookie: [] }, { userBearer: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [ui]
      operationId: updateMe
      summary: Update the signed-in user (self only)
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { name: { type: string } }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/users/{id}:
    get:
      tags: [ui]
      operationId: getUser
      summary: Public user profile
      description: Peer-visible fields plus mutual fleets (caller ∩ subject). 404 if not allowed.
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/fleets:
    get:
      tags: [ui]
      operationId: listFleets
      summary: Fleets the current user belongs to
      security: [{ accessCookie: [] }, { userBearer: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Fleet" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [ui]
      operationId: createFleet
      summary: Create a group fleet (invitable/manageable), owned by the caller
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                metadata: { type: object, additionalProperties: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /v1/fleets/{id}:
    get:
      tags: [ui]
      operationId: getFleet
      summary: Get a fleet the caller belongs to
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Fleet" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [ui]
      operationId: updateFleet
      summary: Update a fleet (owner only)
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                metadata: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [ui]
      operationId: deleteFleet
      summary: Delete a group fleet (owner only; personal fleets can't be deleted)
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "204": { description: Deleted }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/rovers:
    get:
      tags: [ui]
      operationId: listRovers
      summary: Rovers in a fleet with presence status
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/FleetIdQuery" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Rover" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [rover]
      operationId: createRover
      summary: Exchange an enrollment code (bearer) for an active rover + connection token
      security: [{ enrollmentCode: [] }]
      parameters:
        - { $ref: "#/components/parameters/RoverVersion" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollRequest" }
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/rovers/{id}:
    get:
      tags: [rover]
      operationId: getRover
      summary: Read a rover (fleet session, or the rover's own connection token)
      security: [{ accessCookie: [] }, { userBearer: [] }, { roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rover" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }
    patch:
      tags: [ui]
      operationId: patchRover
      summary: Update a rover's fields
      description: >
        Owner/admin may set name, tags, and units; the rover's own connection
        token may set auto_tags. Fields outside the caller's scope are rejected.
      security: [{ accessCookie: [] }, { userBearer: [] }, { roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1 }
                units: { type: integer, minimum: 1, maximum: 100 }
                auto_tags: { type: array, items: { type: string } }
                tags: { type: array, items: { type: string } }
      responses:
        "204": { description: Updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }
    delete:
      tags: [ui]
      operationId: deleteRover
      summary: Revoke a rover (owner/admin, or the rover's own connection token; its connection token stops working)
      security: [{ accessCookie: [] }, { userBearer: [] }, { roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/rovers/{id}/stream:
    get:
      tags: [rover]
      operationId: roverStream
      summary: Server-Sent Events stream of config updates and revocation for the rover
      description: >
        SSE stream (the rover's own connection token). The server pushes
        `config` events `{"name":"...","units":N,"tags":[]}` whenever the
        rover's settings change, and a `revoke` event when the rover is revoked
        (after which the connection token stops working). Auto-reconnect is the
        rover's responsibility.
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/enrollment-codes:
    get:
      tags: [ui]
      operationId: listEnrollmentCodes
      summary: Enrollment codes for a fleet
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/FleetIdQuery" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/EnrollmentCode" } }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    post:
      tags: [ui]
      operationId: createEnrollmentCode
      summary: Create an enrollment code (1 use by default, up to 100 uses)
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEnrollmentCodeRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollmentCode" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/enrollment-codes/{id}:
    patch:
      tags: [ui]
      operationId: patchEnrollmentCode
      summary: Update a pending rover enrollment approval
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchEnrollmentCodeRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollmentCode" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/Gone" }
    delete:
      tags: [ui]
      operationId: deleteEnrollmentCode
      summary: Revoke an enrollment code
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/operations:
    post:
      tags: [ui]
      operationId: createOperation
      summary: Create an operation, applying the auto-exec policy
      description: >
        Creates an operation. If the assignee resolves to a pilot (or a crew
        with ≥1 pilot) a run is auto-dispatched and the operation is
        `in_progress`; a human-only (or empty) assignee leaves it in `backlog`.
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOperationRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
    get:
      tags: [ui]
      operationId: listOperations
      summary: List operations (board column, filters, or text query)
      description: >
        Shared list endpoint for the board and typeahead. With `q`, matches
        title substring, numeric sequence, or `KEY-123` code (default limit
        20). With `status`, returns that column newest-first, keyset-paginated
        by `before` (operation public id) and `limit` (default 50, max 200),
        optionally scoped to a `mission` and other board filters. Without
        `status` or `q`, returns a bounded newest page across statuses.
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/FleetIdQuery" }
        - { name: q, in: query, schema: { type: string }, description: "title substring, sequence, or KEY-123 code" }
        - { name: status, in: query, schema: { type: string } }
        - { name: mission, in: query, schema: { type: string, format: uuid } }
        - { name: before, in: query, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, maximum: 200 }, description: "default 50 (20 when q is set)" }
        - { name: priority, in: query, schema: { type: integer }, description: 0–4 }
        - { name: assignee_kind, in: query, schema: { type: string, enum: [user, pilot, crew] } }
        - { name: assignee, in: query, schema: { type: string, format: uuid }, description: specific user or crew }
        - { name: pilot, in: query, schema: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" }, description: specific pilot kind }
        - { name: creator, in: query, schema: { type: string, format: uuid } }
        - { name: label, in: query, schema: { type: string, format: uuid } }
        - { name: archived, in: query, schema: { type: string, enum: ["1"] }, description: 1 = include archived (default hidden) }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Operation" } }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/operations/stats:
    get:
      tags: [ui]
      operationId: operationsStats
      summary: Operation stats for the board
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/FleetIdQuery" }
        - name: metrics
          in: query
          schema: { type: string, default: "by_status,working" }
          description: Comma-separated metrics (by_status, working)
        - { name: mission, in: query, schema: { type: string, format: uuid } }
        - { name: priority, in: query, schema: { type: integer } }
        - { name: assignee_kind, in: query, schema: { type: string, enum: [user, pilot, crew] } }
        - { name: assignee, in: query, schema: { type: string, format: uuid } }
        - { name: pilot, in: query, schema: { type: string } }
        - { name: creator, in: query, schema: { type: string, format: uuid } }
        - { name: label, in: query, schema: { type: string, format: uuid } }
        - { name: archived, in: query, schema: { type: string, enum: ["1"] } }
      responses:
        "200": { description: OK }
        "400": { $ref: "#/components/responses/BadRequest" }

  /v1/source-actions:
    post:
      tags: [ui]
      operationId: createSourceAction
      summary: Queue a rover-handled source checkout action for an operation worktree
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operation_id, kind]
              properties:
                operation_id: { type: string, format: uuid, description: operation public id }
                kind: { type: string, enum: [apply_to_source, create_source_branch, refresh_from_source] }
                branch_name: { type: string, description: Optional local branch name for kind=create_source_branch }
      responses:
        "201":
          description: Queued
          content: { application/json: { schema: { $ref: "#/components/schemas/SourceAction" } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/pull-requests:
    post:
      tags: [ui]
      operationId: addPullRequest
      summary: Link a pull request to an operation (manual)
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [operation_id, url], properties: { operation_id: { type: string, format: uuid, description: operation public id }, url: { type: string }, title: { type: string }, number: { type: integer }, metadata: { type: object, additionalProperties: true } } } } }
      responses:
        "201":
          description: Linked
          content: { application/json: { schema: { $ref: "#/components/schemas/PullRequest" } } }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/pull-requests/{id}:
    delete:
      tags: [ui]
      operationId: deletePullRequest
      summary: Unlink a pull request
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { description: Unlinked }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/assets:
    get:
      tags: [assets]
      operationId: listAssets
      summary: List ready assets in a fleet
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/FleetIdQuery" }
        - name: operation_id
          in: query
          schema: { type: string, format: uuid }
          description: Optional; conversation view (refs + metadata.operation_id)
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Asset" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [assets]
      operationId: createAsset
      summary: Create an asset and upload target
      security: [{ accessCookie: [] }, { userBearer: [] }, { roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/RoverVersion" }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateAssetRequest" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/AssetUploadIntent" } } }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/routines:
    get:
      tags: [ui]
      operationId: listRoutines
      summary: Reusable operation templates
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/FleetIdQuery" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Routine" } } } } }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    post:
      tags: [ui]
      operationId: createRoutine
      summary: Create a routine
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateRoutineRequest" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Routine" } } } }
