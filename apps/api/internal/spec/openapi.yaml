      tags: [ui]
      operationId: createMission
      summary: Create a mission with a key used to prefix operation codes
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMissionRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mission" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/missions/stats:
    get:
      tags: [ui]
      operationId: missionsStats
      summary: Mission stats
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/FleetIdQuery" }
        - name: metrics
          in: query
          schema: { type: string, default: by_mission }
      responses:
        "200": { description: OK }
        "400": { $ref: "#/components/responses/BadRequest" }

  /v1/missions/{id}:
    get:
      tags: [ui]
      operationId: getMission
      summary: Get a mission by public id
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Mission" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [ui]
      operationId: updateMission
      summary: Rename a mission and/or its key
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMissionRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mission" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/signals:
    get:
      tags: [ui]
      operationId: listSignals
      summary: The current user's (non-archived) signals in the fleet
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/FleetIdQuery" }]
      responses:
        "200":
          description: OK (unread first, newest first)
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Signal" } }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/signals/{id}:
    patch:
      tags: [ui]
      operationId: patchSignal
      summary: Mark a signal read or archive it
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                read: { type: boolean }
                archived: { type: boolean }
      responses:
        "204":
          description: Updated
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/ws:
    get:
      tags: [ui]
      operationId: websocket
      summary: WebSocket stream of typed change events for the current user
      description: >
        WebSocket upgrade (cookie-authed). The server pushes typed JSON frames
        `{"t":"operation"|"run"|"run_message"|"comment"|"signal"|"rover",
        "fleet_id":"..."}` whenever data changes in one of the user's fleets, so the client
        can revalidate only the active or affected fleet. Auto-reconnect + resync is the
        client's responsibility. (Sourced from PostgreSQL LISTEN/NOTIFY, so it works
        across API instances.)
      security: [{ accessCookie: [] }, { userBearer: [] }]
      responses:
        "101": { description: Switching Protocols (WebSocket) }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/fleets/{id}/members:
    get:
      tags: [ui]
      operationId: listMembers
      summary: Human members of the fleet
      description: Nested under fleet — membership is scoped to the tenant, not a global collection.
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Member" } }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/fleets/{id}/members/{member_id}:
    patch:
      tags: [ui]
      operationId: updateMemberRole
      summary: Change a member's role (owner only)
      description: Nested exception — fleet membership is a parent-coupled join.
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: member_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties: { role: { type: string, enum: [owner, admin, member] } }
      responses:
        "204": { description: Updated }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [ui]
      operationId: removeMember
      summary: Remove a member from the fleet (owner/admin only; cannot remove an owner)
      description: Nested exception — fleet membership is a parent-coupled join.
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: member_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/invitations:
    get:
      tags: [ui]
      operationId: listInvitations
      summary: Pending invitations for the fleet (owner/admin only)
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/FleetIdQuery" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Invitation" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [ui]
      operationId: createInvitation
      summary: Invite a teammate by email (owner/admin only)
      description: >
        Matched on the email the invitee registers with; no email is sent.
        409 if the email is already a member or already has a pending invitation.
      security: [{ accessCookie: [] }, { userBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fleet_id, email]
              properties:
                fleet_id: { type: string, format: uuid }
                email: { type: string, format: email }
                role: { type: string, enum: [admin, member], default: member }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invitation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Already a member or already invited }

  /v1/invitations/mine:
    get:
      tags: [ui]
      operationId: myInvitations
      summary: Pending invitations addressed to the signed-in user
      security: [{ accessCookie: [] }, { userBearer: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/MyInvite" } }
        "4XX": { description: Client error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/invitations/{id}:
    patch:
      tags: [ui]
      operationId: patchInvitation
      summary: Accept or decline an invitation
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [accepted, declined] }
      responses:
        "200": { description: Accepted (returns fleet_id) }
        "204": { description: Declined }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [ui]
      operationId: revokeInvitation
      summary: Revoke a pending invitation (owner/admin only)
      security: [{ accessCookie: [] }, { userBearer: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/runs/accept:
    post:
      tags: [rover]
      operationId: acceptRun
      summary: Long-poll accept the oldest queued run in the rover's fleet
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/RoverVersion" }
      responses:
        "200":
          description: A run was accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcceptedRun" }
        "204": { description: No queued runs before the long-poll deadline }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/source-actions/accept:
    post:
      tags: [rover]
      operationId: acceptSourceAction
      summary: Accept a queued local source action pinned to this rover
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/RoverVersion" }
      responses:
        "200":
          description: A source action was accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcceptedSourceAction" }
        "204": { description: No queued source action for this rover }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/source-actions/{id}:
    patch:
      tags: [rover]
      operationId: completeSourceAction
      summary: Report an accepted source action result
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CompleteSourceActionRequest" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/SourceAction" } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/runs/{id}/heartbeat:
    put:
      tags: [rover]
      operationId: heartbeat
      summary: Renew a run's lease
      description: Nested exception — lease renewal is tightly coupled to the active run (no standalone lease resource).
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      responses:
        "204": { description: Lease renewed }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/runs/{id}/events:
    post:
      tags: [rover]
      operationId: appendRunEvent
      summary: Append an event to a run's timeline
      description: Nested exception — append-only telemetry; not listed as a standalone collection.
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppendEventRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunEvent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/runs/{id}/artifacts:
    post:
      tags: [rover]
      operationId: appendArtifact
      summary: Attach an artifact (e.g. a git diff) to a run
      description: Nested exception — append-only under the owning run.
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppendArtifactRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artifact" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/runs/{id}/messages:
    post:
      tags: [rover]
      operationId: appendRunMessage
      summary: Append a typed transcript message (pilot telemetry) to a run
      description: Nested exception — append-only pilot telemetry under the owning run.
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunMessageRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunMessage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

  /v1/runs/{id}/result:
    post:
      tags: [rover]
      operationId: runResult
      summary: Submit run result (terminal status, session, message, optional spawn payload)
      description: Nested under the run. Sets status and finalized_at together; second call is 409.
      security: [{ roverConnectionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/RoverVersion" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunResultRequest" }
      responses:
        "204": { description: Recorded }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "426": { $ref: "#/components/responses/UpgradeRequired" }

components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: ufo_access
      description: "Browser auth: httpOnly access JWT cookie."
    userBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User access JWT for non-browser clients.
    enrollmentCode:
      type: http
      scheme: bearer
      description: Enrollment code from the Rovers panel; exchanged once for a connection token.
    roverConnectionToken:
      type: http
      scheme: bearer
      description: Per-rover connection token returned by enrollment.

  parameters:
    Id:
      name: id
      in: path
      required: true
      description: Public resource id.
      schema: { type: string, format: uuid }
    FleetIdQuery:
      name: fleet_id
      in: query
      required: false
      description: Optional fleet public id filter; omitted means all fleets visible to the caller.
      schema: { type: string, format: uuid }
    RoverVersion:
      name: X-UFO-Rover-Version
      in: header
      required: false
      description: Required when authenticating with an enrollment code or rover connection token; ignored for user-authenticated requests.
      schema:
        type: string
        example: "0.5.0"

  responses:
    BadRequest:
      description: Bad request
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Not authenticated
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Not a member of the fleet
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: Already exists
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Gone:
      description: Expired
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    UpgradeRequired:
      description: Rover version is outside this Hub's supported range.
      headers:
        X-UFO-Rover-Min-Version:
          description: Minimum UFO rover CLI version accepted by this Hub, when configured.
          schema: { type: string }
        X-UFO-Rover-Max-Version:
          description: Maximum UFO rover CLI version accepted by this Hub, when configured.
          schema: { type: string }
        X-UFO-Hub-Version:
          description: Hub version that rejected the rover request.
          schema: { type: string }
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  schemas:
    Error:
      type: object
      properties: { error: { type: string } }

    Me:
      type: object
      description: Private profile for the signed-in user (`GET|PATCH /v1/users/me`).
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UserProfile:
      type: object
      description: Public peer profile; fleets lists mutual fleets only (caller ∩ subject).
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        fleets: { type: array, items: { $ref: "#/components/schemas/Fleet" } }

    AuthResponse:
      type: object
      required: [user, expires_at]
      properties:
        user: { $ref: "#/components/schemas/Me" }
        expires_at: { type: string, format: date-time }

    Fleet:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string, enum: [personal, group], description: personal fleets can't be invited to/deleted }
        metadata: { type: object, additionalProperties: true, readOnly: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Rover:
      type: object
      properties:
        id: { type: string, format: uuid }
        fleet_id: { type: string, format: uuid }
        fleet_name: { type: string }
        name: { type: string }
        status: { type: string, enum: [online, full, offline], description: full means all units are occupied }
        units: { type: integer, minimum: 1, maximum: 100, description: concurrent operations this rover can process }
        running_units: { type: integer, minimum: 0, description: active operations currently accepted by this rover }
        auto_tags: { type: array, items: { type: string }, description: "rover-detected (pilot:*, os:*, arch:*)" }
        tags: { type: array, items: { type: string }, description: user-set dispatch tags }
        metadata: { type: object, additionalProperties: true, readOnly: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }

    EnrollmentCode:
      type: object
      properties:
        id: { type: string, format: uuid }
        fleet_id: { type: string, format: uuid, description: Present for fleet-owned approved enrollment codes. }
        code: { type: string }
        kind: { type: string, enum: ["code:approved", "web:pending", "web:approved", "web:denied"] }
        name: { type: string }
        remaining_uses: { type: integer, minimum: 1, maximum: 100 }
        metadata: { type: object, additionalProperties: true, readOnly: true }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }

    CreateEnrollmentCodeRequest:
      type: object
      properties:
        fleet_id:
          type: string
          format: uuid
          description: Required for reusable code creation and web approval; omit for web:pending and web:denied.
        code:
          type: string
          pattern: "^[a-f0-9]{40}$"
          description: Rover-generated browser enrollment code. With pending=true, records web:pending without a fleet; otherwise records web:approved against the selected fleet or web:denied without a fleet.
        pending:
          type: boolean
          default: false
          description: With code, record this web enrollment as web:pending.
        denied:
          type: boolean
          default: false
          description: With code, record this web enrollment as web:denied instead of web:approved.
        name:
          type: string
          description: Required when uses > 1. For web approvals, this approved rover name overrides the rover-provided name.
        units:
          type: integer
          minimum: 1
          maximum: 100
          default: 1
          description: For web approvals, approved initial rover concurrency.
        tags:
          type: array
          items: { type: string }
          description: For web approvals, approved user dispatch tags.
        uses:
          type: integer
          minimum: 1
          maximum: 100
          default: 1
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional; must be ≤ 1 year out.

    PatchEnrollmentCodeRequest:
      type: object
      required: [kind]
      properties:
        fleet_id:
          type: string
          format: uuid
          description: Required when kind is web:approved; omit when kind is web:denied.
        kind:
          type: string
          enum: ["web:approved", "web:denied"]
          description: Set web:approved to approve a pending browser enrollment; set web:denied to deny it.
        name:
          type: string
          description: Approved rover name.
        units:
          type: integer
          minimum: 1
          maximum: 100
          default: 1
          description: Approved initial rover concurrency.
        tags:
          type: array
          items: { type: string }
          description: Approved user dispatch tags.

    EnrollRequest:
      type: object
      properties:
        name: { type: string, description: Rover name (defaults to hostname) }
        units: { type: integer, minimum: 1, maximum: 100, description: initial concurrency (hub-owned thereafter) }
        auto_tags: { type: array, items: { type: string }, description: rover-detected tags }
        tags: { type: array, items: { type: string }, description: user dispatch tags }

    EnrollResponse:
      type: object
      properties:
        token: { type: string, description: The per-rover connection token }
        id: { type: string, format: uuid }
        fleet_id: { type: string, format: uuid }
        fleet_name: { type: string }
        name: { type: string }
        units: { type: integer, minimum: 1, maximum: 100 }
        tags: { type: array, items: { type: string } }

    Operation:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        status: { type: string, enum: [backlog, todo, in_progress, in_review, done, blocked, canceled] }
        active_run_status: { type: string, enum: ["", queued, accepted, starting, running], description: "Current in-flight run status, empty when none" }
        mission_id: { type: string, format: uuid, description: The mission this operation belongs to (required) }
        sequence: { type: integer, description: Per-mission running number; displayed as <mission.key>-<sequence> }
        priority: { type: integer, description: 0 none → 4 urgent }
        assignee_type: { type: string, enum: [pilot, user, crew], nullable: true }
        assignee_id: { type: string, format: uuid, nullable: true, description: Referenced user/crew public id (null when assignee is a pilot) }
        assignee_pilot_kind: { type: string, nullable: true, description: Pilot kind when assignee_type=pilot (e.g. codex) }
        required_tags: { type: array, items: { type: string }, description: dispatch allow list (rover must have all) }
        excluded_tags: { type: array, items: { type: string }, description: dispatch deny list (rover must have none; deny wins) }
        labels: { type: array, items: { $ref: "#/components/schemas/Label" } }
        reactions: { type: array, items: { $ref: "#/components/schemas/Reaction" }, description: only populated in the detail view }
        sub_operation_progress: { type: object, properties: { total: { type: integer }, done: { type: integer }, in_progress: { type: integer }, in_review: { type: integer }, blocked: { type: integer }, pilot_kinds: { type: array, items: { type: string } } }, description: sub-operation progress }
        metadata: { type: object, additionalProperties: true, readOnly: true, description: Operation metadata object for optional feature flags and future fields }
        sub_operations_enabled: { type: boolean, description: Captain may split this operation into sub-operations }
        start_date: { type: string, format: date, nullable: true, description: Planning start date }
        due_date: { type: string, format: date, nullable: true, description: Planning due date }
        main_operation_id: { type: string, format: uuid, nullable: true, description: Main operation public id for a sub-operation; nested sub-operations are rejected }
        orchestrating: { type: boolean, description: captain split this operation into sub-operations and will reconvene to reconcile them }
        archived: { type: boolean }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time, nullable: true, description: Lifecycle timestamp set when work starts }
        finished_at: { type: string, format: date-time, nullable: true, description: Lifecycle timestamp set when work reaches done/canceled }

    Label:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Routine:
      type: object
      properties:
        id: { type: string, format: uuid }
        mission_id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        metadata: { $ref: "#/components/schemas/RoutineMetadata" }
        operation_metadata: { $ref: "#/components/schemas/RoutineOperationMetadata" }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        next_pulse_at: { type: string, format: date-time, nullable: true }
        last_pulsed_at: { type: string, format: date-time, nullable: true }

    Pulse:
      type: object
      properties:
        id: { type: string, format: uuid }
        routine_id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [pending, succeeded, skipped, failed] }
        metadata: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }

    RoutineMetadata:
      type: object
      additionalProperties: true
      properties:
        trigger:
          type: object
          additionalProperties: true
          properties:
            kind: { type: string, enum: [manual, schedule], default: manual }
            cron: { type: string, description: "Required when trigger.kind=schedule; supports @hourly/@daily/@weekly and simple five-field cron" }
        operation:
          type: object
          additionalProperties: true
          properties:
            start_immediately: { type: boolean, default: true }
            priority: { type: integer, minimum: 0, maximum: 4 }
            assignee:
              type: object
              nullable: true
              properties:
                type: { type: string, enum: [pilot, user, crew] }
                id: { type: string, description: "user/crew public id, or pilot kind when type=pilot" }
            required_tags: { type: array, items: { type: string } }
            excluded_tags: { type: array, items: { type: string } }

    RoutineOperationMetadata:
      type: object
      additionalProperties: true
      properties:
        context: { type: string }

    OperationReference:
      type: object
      description: Compact operation reference (relations, link pickers) — enough to render a code and status.
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status: { type: string }
        sequence: { type: integer }
        mission_id: { type: string, format: uuid }

    Relation:
      type: object
      description: A directed link to another operation, shown from this operation's side.
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [blocks, blocked_by, relates, duplicate, duplicated_by] }
        operation: { $ref: "#/components/schemas/OperationReference" }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    SourceAction:
      type: object
      properties:
        id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid }
        run_id: { type: string, format: uuid, nullable: true }
        rover_id: { type: string, format: uuid, nullable: true }
        kind: { type: string, enum: [apply_to_source, create_source_branch, refresh_from_source] }
        status: { type: string, enum: [queued, accepted, succeeded, failed, conflicted] }
        branch_name: { type: string }
        commit_sha: { type: string }
        base_sha: { type: string }
        source_head_sha: { type: string }
        message: { type: string }
        metadata: { type: object, additionalProperties: true }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        accepted_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }

    PullRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        url: { type: string }
        title: { type: string }
        status: { type: string }
        number: { type: integer, nullable: true }
        metadata: { type: object, additionalProperties: true }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Pilot:
      type: object
      description: A pilot kind with the fleet rovers it can drive, and availability.
      properties:
        kind: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" }
        rovers: { type: integer, description: rovers in the fleet this pilot can drive }
        online_rovers: { type: integer, description: rovers in that set currently online }

    Crew:
      type: object
      description: A team of pilots and/or humans an operation can be assigned to.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        members: { type: array, items: { $ref: "#/components/schemas/CrewMember" } }

    CrewMember:
      type: object
      properties:
        member_type: { type: string, enum: [pilot, user] }
        member_id: { type: string, description: "user public id, or pilot kind when member_type=pilot" }
        role: { type: string, enum: [captain, member] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Member:
      type: object
      description: A human member of the fleet.
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [owner, admin, member] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Invitation:
      type: object
      description: A pending invitation to join the fleet (matched by email; no email is sent).
      properties:
        id: { type: string, format: uuid }
        invitee_email: { type: string, format: email }
        role: { type: string, enum: [admin, member] }
        status: { type: string, enum: [pending, accepted, declined, expired] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }

    MyInvite:
      type: object
      description: An invitation addressed to the signed-in user, with the inviting fleet's name.
      properties:
        id: { type: string, format: uuid }
        fleet_id: { type: string, format: uuid }
        fleet_name: { type: string }
        role: { type: string, enum: [admin, member] }
        invitee_email: { type: string, format: email }

    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        author_type: { type: string, enum: [user, pilot, system] }
        author_id: { type: string, format: uuid, nullable: true, description: user public id (null when author is a pilot/system) }
        author_pilot_kind: { type: string, nullable: true, description: pilot kind when author_type=pilot }
        body: { type: string }
        reactions: { type: array, items: { $ref: "#/components/schemas/Reaction" } }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Reaction:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        mine: { type: boolean }
        users: { type: array, items: { type: string }, description: reactors oldest-first (hover tooltip) }

    Signal:
      type: object
      description: An action signal for a human (e.g. a pilot delivered work to review).
      properties:
        id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid, nullable: true }
        type: { type: string, example: review_requested, description: "e.g. review_requested, input_requested, task_failed" }
        severity: { type: string, enum: [action_required, attention, info] }
        title: { type: string }
        body: { type: string }
        read: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Mission:
      type: object
      description: A grouping of operations within a fleet, with a fleet-unique operation-prefix key.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string, description: Operation prefix (e.g. MSJ -> MSJ-123); unique within the fleet }
        metadata: { type: object, additionalProperties: true, readOnly: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateMissionRequest:
      type: object
      required: [fleet_id, name, key]
      properties:
        fleet_id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string, description: Operation prefix (alphanumeric; unique within the fleet) }
        metadata: { type: object, additionalProperties: true }

    UpdateMissionRequest:
      type: object
      required: [name, key]
      properties:
        name: { type: string }
        key: { type: string, description: Operation prefix (alphanumeric; unique within the fleet) }
        metadata: { type: object, additionalProperties: true }

    Run:
      type: object
      properties:
        id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid }
        pilot: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" }
        status:
          type: string
          enum: [queued, accepted, starting, running, blocked, succeeded, failed, canceled]
        needs_input: { type: boolean, description: pilot ended this run awaiting a human answer }
        metadata: { type: object, additionalProperties: true, readOnly: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RunEvent:
      type: object
      description: Events are ordered by insertion.
      properties:
        kind: { type: string }
        message: { type: string }
        created_at: { type: string, format: date-time }

    Artifact:
      type: object
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid, nullable: true }
        kind: { type: string, example: diff }
        name: { type: string, example: git.diff }
        content: { type: string, description: "Text preview; fetch /v1/artifacts/{id}/content for the full content" }
        content_type: { type: string }
        byte_size: { type: integer, format: int64 }
        checksums: { type: object, additionalProperties: { type: string } }
        metadata: { type: object, additionalProperties: true, readOnly: true }
        created_at: { type: string, format: date-time }

    Asset:
      type: object
      properties:
        id: { type: string, format: uuid }
        filename: { type: string }
        content_type: { type: string }
        byte_size: { type: integer, format: int64 }
        checksums: { type: object, additionalProperties: { type: string } }
        url: { type: string }
        metadata: { type: object, additionalProperties: true, readOnly: true }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ResolveAssetsRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          maxItems: 1000
          items: { type: string, format: uuid }

    CreateAssetRequest:
      type: object
      required: [filename, byte_size]
      properties:
        fleet_id: { type: string, format: uuid, nullable: true, description: Required for fleet-level uploads without a more specific context. }
        context: { $ref: "#/components/schemas/CreateAssetContext" }
        filename: { type: string }
        content_type: { type: string }
        byte_size: { type: integer, format: int64, minimum: 1, description: Must fit the configured asset upload limit. }

    CreateAssetContext:
      type: object
      description: Optional concrete resource context for upload recovery and storage ownership. Include at most one field. Rovers use run_id; users use operation_id or user_id.
      properties:
        operation_id: { type: string, format: uuid, nullable: true }
        run_id: { type: string, format: uuid, nullable: true }
        user_id: { type: string, format: uuid, nullable: true }

    PatchAssetRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ready] }

    AssetUploadIntent:
      type: object
      properties:
        asset_id: { type: string, format: uuid }
        method: { type: string, example: PUT }
        url: { type: string }
        headers: { type: object, additionalProperties: { type: string } }
        expires_at: { type: string, format: date-time }

    OperationDetail:
      type: object
      properties:
        operation: { $ref: "#/components/schemas/Operation" }
        comments: { type: array, items: { $ref: "#/components/schemas/Comment" } }
        comments_more: { type: boolean }
        runs: { type: array, items: { $ref: "#/components/schemas/Run" } }
        sub_operations: { type: array, items: { $ref: "#/components/schemas/Operation" } }
        relations: { type: array, items: { $ref: "#/components/schemas/Relation" } }
        source_action_available: { type: boolean }
        source_rover_id: { type: string, format: uuid, nullable: true }
        source_actions: { type: array, items: { $ref: "#/components/schemas/SourceAction" } }
        pull_requests: { type: array, items: { $ref: "#/components/schemas/PullRequest" } }

    CommentsPage:
      type: object
      properties:
        comments: { type: array, items: { $ref: "#/components/schemas/Comment" } }
        comments_more: { type: boolean }

    RunDetail:
      type: object
      properties:
        run: { $ref: "#/components/schemas/Run" }
        events: { type: array, items: { $ref: "#/components/schemas/RunEvent" } }
        artifacts: { type: array, items: { $ref: "#/components/schemas/Artifact" } }
        messages: { type: array, items: { $ref: "#/components/schemas/RunMessage" } }

    RunMessage:
      type: object
      description: One typed transcript entry (pilot telemetry) for a run.
      properties:
        sequence: { type: integer }
        type: { type: string, enum: [text, thinking, tool_use, tool_result, error] }
        tool: { type: string }
        content: { type: string }
        input: { type: object, additionalProperties: true, nullable: true }
        output: { type: string }
        created_at: { type: string, format: date-time }

    RunMessageRequest:
      type: object
      required: [sequence, type]
      properties:
        sequence: { type: integer }
        type: { type: string, enum: [text, thinking, tool_use, tool_result, error] }
        tool: { type: string }
        content: { type: string }
        input: { type: object, additionalProperties: true }
        output: { type: string }

    AcceptedRun:
      type: object
      description: Rover-facing view of an accepted run.
      properties:
        id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid }
        operation_created_at: { type: string, format: date-time }
        operation_worktree_name: { type: string }
        worktree_enabled: { type: boolean }
        status: { type: string }
        pilot: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" }
        command: { type: string, description: "Resume prompt carried to the pilot, if any" }
        prompt: { type: string, description: First run = operation conversation; resume run = the human reply }
        session_id: { type: string, description: Non-empty → resume this pilot session }
        can_propose_sub_operations: { type: boolean, description: captain may propose sub-operations (top-level crew operation only) }
        assets:
          type: array
          items: { $ref: "#/components/schemas/AcceptedAsset" }

    AcceptedSourceAction:
      type: object
      description: Rover-facing view of an accepted local source action.
      properties:
        id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid }
        operation_title: { type: string }
        operation_created_at: { type: string, format: date-time }
        operation_worktree_name: { type: string }
        kind: { type: string, enum: [apply_to_source, create_source_branch, refresh_from_source] }
        branch_name: { type: string }

    CompleteSourceActionRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [succeeded, failed, conflicted] }
        branch_name: { type: string }
        commit_sha: { type: string }
        base_sha: { type: string }
        source_head_sha: { type: string }
        message: { type: string }
        metadata: { type: object, additionalProperties: true }

    AcceptedAsset:
      type: object
      description: Asset referenced from an accepted run prompt.
      properties:
        id: { type: string, format: uuid }
        filename: { type: string }
        content_type: { type: string }
        byte_size: { type: integer, format: int64 }
        url: { type: string }

    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string, minLength: 8 }
        name: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    CreateOperationRequest:
      type: object
      required: [fleet_id, title, mission_id]
      properties:
        fleet_id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string, description: The operation's prompt for the assigned pilot }
        mission_id: { type: string, format: uuid, description: Required — every operation belongs to a mission }
        assignee_type: { type: string, enum: [pilot, user, crew], nullable: true }
        assignee_id: { type: string, nullable: true, description: "user/crew public id, or pilot kind when assignee_type=pilot" }
        required_tags: { type: array, items: { type: string } }
        excluded_tags: { type: array, items: { type: string } }
        asset_ids: { type: array, items: { type: string, format: uuid }, description: Ready uploaded assets to attach to the new operation }
        priority: { type: integer, minimum: 0, maximum: 4 }
        main_operation_id: { type: string, format: uuid, nullable: true, description: Main operation public id; must not point to a sub-operation }
        sub_operations_enabled: { type: boolean, description: Captain may split this operation into sub-operations; default true }
        start_date: { type: string, format: date, nullable: true }
        due_date: { type: string, format: date, nullable: true }

    CreateRoutineRequest:
      type: object
      required: [fleet_id, mission_id, title]
      properties:
        fleet_id: { type: string, format: uuid }
        mission_id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        metadata: { $ref: "#/components/schemas/RoutineMetadata" }
        operation_metadata: { $ref: "#/components/schemas/RoutineOperationMetadata" }

    UpdateRoutineRequest:
      type: object
      required: [mission_id, title]
      properties:
        mission_id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        metadata: { $ref: "#/components/schemas/RoutineMetadata" }
        operation_metadata: { $ref: "#/components/schemas/RoutineOperationMetadata" }

    OperationPatch:
      type: object
      properties:
        title: { type: string }
        body: { type: string }
        mission_id:
          type: string
          format: uuid
          description: >
            Move the operation (and its sub-operations) to another mission in
            the same fleet. Allocates a new per-mission sequence, clears the
            pilot session so the next run uses the new mission/fleet context,
            and posts a system communication. Rejected while a run is active.
        assignee_type: { type: string, enum: [pilot, user, crew], nullable: true }
        assignee_id: { type: string, nullable: true, description: "user/crew public id, or pilot kind when assignee_type=pilot" }
        status: { type: string, enum: [backlog, todo, in_progress, in_review, done, blocked, canceled] }
        required_tags: { type: array, items: { type: string } }
        excluded_tags: { type: array, items: { type: string } }
        priority: { type: integer, minimum: 0, maximum: 4 }
        start_date: { type: string, format: date, nullable: true }
        due_date: { type: string, format: date, nullable: true }
        main_operation_id: { type: string, format: uuid, nullable: true, description: Main operation public id; must not point to a sub-operation }
        sub_operations_enabled: { type: boolean }
        archived: { type: boolean }

    PostCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string }

    CreateCommentRequest:
      type: object
      required: [operation_id, body]
      properties:
        operation_id: { type: string, format: uuid }
        body: { type: string }

    CreateCrewRequest:
      type: object
      required: [fleet_id, name]
      properties:
        fleet_id: { type: string, format: uuid }
        name: { type: string }

    CrewMemberRequest:
      type: object
      properties:
        role: { type: string, enum: [captain, member], default: member }

    PatchRunRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [starting, running, blocked, succeeded, failed, canceled]
          description: User-authenticated requests only accept canceled; rover tokens accept all listed statuses.
        metadata:
          type: object
          additionalProperties: true
          description: Rover-reported run metadata to merge, such as local worktree path.

    AppendEventRequest:
      type: object
      properties:
        kind: { type: string, default: log }
        message: { type: string }

    AppendArtifactRequest:
      type: object
      properties:
        kind: { type: string, default: artifact, example: diff }
        name: { type: string, example: git.diff }
        content: { type: string }

    RunResultRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [succeeded, failed]
        session_id: { type: string, description: The pilot session id to persist for resume }
        message: { type: string, description: The pilot's final message; posted as a pilot comment if non-empty }
        needs_input: { type: boolean, description: pilot is awaiting a human answer to continue (→ input_requested signal) }
        operation_status: { type: string, description: pilot-requested operation status (overrides the default success→in_review / fail→blocked mapping) }
        operations: { type: array, description: "explicit first-class operations to create in the current mission; these are not sub-operations; they inherit the current operation assignee and normal auto-run behavior", items: { type: object, required: [title], properties: { title: { type: string }, body: { type: string } } } }
        sub_operations: { type: array, description: "captain's split into parallel sub-operations (top-level crew operation only; capped at 8)", items: { type: object, required: [title], properties: { title: { type: string }, body: { type: string }, assignee: { type: string, description: optional crew-member pilot kind; default = distributed available crew pilot } } } }
        sub_operations_feedback: { type: array, description: "captain feedback for existing sub-operations; posts each body to that same sub-operation and resumes its pilot", items: { type: object, required: [operation_id, body], properties: { operation_id: { type: string }, body: { type: string } } } }
