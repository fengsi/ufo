name: ufo

services:
  postgres:
    image: postgres:18
    container_name: ufo-postgres
    environment:
      POSTGRES_USER: ufo
      POSTGRES_PASSWORD: ufo
      POSTGRES_DB: ufo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ufo -d ufo"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: ufo-api
    environment:
      UFO_HUB_DATABASE_URL: postgres://ufo:ufo@postgres:5432/ufo?sslmode=disable
      UFO_HUB_BIND: ":8080"
      UFO_HUB_RUN_LEASE_SECONDS: ${UFO_HUB_RUN_LEASE_SECONDS:-30}
      UFO_HUB_LONGPOLL_SECONDS: ${UFO_HUB_LONGPOLL_SECONDS:-25}
      UFO_HUB_MAX_SUB_OPERATIONS: ${UFO_HUB_MAX_SUB_OPERATIONS:-8}
      UFO_HUB_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      UFO_HUB_WEB_URL: ${UFO_HUB_WEB_URL:-http://localhost:3000}
      UFO_HUB_JWT_PRIVATE_KEY: ${UFO_HUB_JWT_PRIVATE_KEY:-}
      UFO_HUB_JWT_ALLOW_EPHEMERAL: ${UFO_HUB_JWT_ALLOW_EPHEMERAL:-1}
      UFO_HUB_JWT_ACCESS_SECONDS: ${UFO_HUB_JWT_ACCESS_SECONDS:-3600}
      UFO_HUB_JWT_ISSUER: ${UFO_HUB_JWT_ISSUER:-ufo-hub}
      UFO_HUB_JWT_AUDIENCE: ${UFO_HUB_JWT_AUDIENCE:-ufo-api}
      UFO_HUB_ASSET_BACKEND: local
      UFO_HUB_ASSET_UPLOAD_MAX_BYTES: ${UFO_HUB_ASSET_UPLOAD_MAX_BYTES:-26214400}
      UFO_HUB_ASSET_UPLOAD_ALLOWED_CONTENT_TYPES: ${UFO_HUB_ASSET_UPLOAD_ALLOWED_CONTENT_TYPES:-}
      UFO_HUB_ASSET_SIGNED_URL_SECONDS: ${UFO_HUB_ASSET_SIGNED_URL_SECONDS:-900}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${HOME}/.ufo/assets:/root/.ufo/assets
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 3s
      timeout: 3s
      retries: 10
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api
          target: /src
        - action: rebuild
          path: ./apps/api/go.mod

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: ufo-web
    environment:
      UFO_HUB_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    develop:
      watch:
        - action: sync
          path: ./apps/web
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./apps/web/package.json

volumes:
  data:
